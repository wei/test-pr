on:
  push:
    branches:
    - "feature/*"  # Support wildcard matching

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: repo-sync
      uses: wei/pull-request@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DESTINATION_BRANCH: "master"
        SOURCE_BRANCH: ""  # Optional, default is the branch that triggered action
        PR_TITLE: "Pulling ${{ github.ref }} into master"
        PR_BODY: ":crown: *This is an automated PR*"  # Full markdown support
        PR_REVIEWER: "wei"    # Comma-separated list (no spaces)
        PR_ASSIGNEE: "wei"    # Comma-separated list (no spaces)
        PR_LABEL: "auto-pr"          # Comma-separated list (no spaces)
        HUB_VERBOSE: "1"             # Enable hub logging
