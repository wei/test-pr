on:
  push:
    branches:     # Matching branch pattern
    - feature/*

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: repo-sync
      uses: wei/pull-request@master
      env:
        DESTINATION_BRANCH: "master"
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#      with:
#        args: '-m "Pulling $SOURCE_BRANCH into $DESTINATION_BRANCH"'
